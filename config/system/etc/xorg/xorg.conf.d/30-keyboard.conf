Section "InputClass"
    Identifier "keyboard-all"
	Driver "evdev"
	MatchIsKeyboard "true"
    Option "XkbLayout" "us"
    Option "XkbModel" "pc105"
    Option "XkbRules" "xorg"
    Option "XkbOptions" "grp:alt_shift_toggle,grp:switch,grp_led:scroll,compose:lwin,terminate:ctrl_alt_bksp"
    Option "XkbVariant" "qwerty"
    MatchIsKeyboard "on"
EndSection
